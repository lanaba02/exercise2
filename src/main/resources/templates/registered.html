<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments :: head (titulo='Registered Users')"></head>
<body>
<nav th:replace="fragments :: navbar"></nav>

<div class="container-fluid">
    <div class="container-fluid mt-5">
        <h1>Registered Users</h1>
        <p>Here is the list of all registered users in the system:</p>

        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Email</th>
                        <th>Status</th>
                        <th>Description</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="usuario : ${usuarios}">
                        <td th:text="${usuario.id}"></td>
                        <td th:text="${usuario.email}"></td>
                        <td>
                            <span th:if="${usuario.enabled}" class="badge bg-success">Enabled</span>
                            <span th:unless="${usuario.enabled}" class="badge bg-danger">Disabled</span>
                        </td>
                        <td>
                            <a th:href="@{/registered/{id}(id=${usuario.id})}" class="btn btn-primary btn-sm">View Details</a>
                        </td>
                        <td>
                            <form th:action="@{/registered/{id}/toggle-status(id=${usuario.id})}" method="post" style="display:inline;">
                                <button th:if="${usuario.enabled}" type="submit" class="btn btn-danger btn-sm">Disable</button>
                                <button th:unless="${usuario.enabled}" type="submit" class="btn btn-success btn-sm">Enable</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div th:if="${#lists.isEmpty(usuarios)}" class="alert alert-info">
            No registered users found.
        </div>
    </div>
</div>
<div th:replace="fragments::javascript"/>
</body>
</html>
