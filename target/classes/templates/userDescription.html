<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments :: head (titulo='User Description')"></head>
<body>
<nav th:replace="fragments :: navbar"></nav>

<div class="container-fluid">
    <div class="container-fluid mt-5">
        <h1>User Description</h1>
        <p>Details for user ID: <span th:text="${usuario.id}"></span></p>

        <div class="card">
            <div class="card-header">
                <h5 class="card-title">User Information</h5>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6">
                        <dl class="row">
                            <dt class="col-sm-4">ID:</dt>
                            <dd class="col-sm-8" th:text="${usuario.id}"></dd>

                            <dt class="col-sm-4">Email:</dt>
                            <dd class="col-sm-8" th:text="${usuario.email}"></dd>

                            <dt class="col-sm-4">Name:</dt>
                            <dd class="col-sm-8" th:text="${usuario.nombre}"></dd>

                            <dt class="col-sm-4">Birth Date:</dt>
                            <dd class="col-sm-8" th:text="${usuario.fechaNacimiento != null ? #temporals.format(usuario.fechaNacimiento, 'dd/MM/yyyy') : 'Not specified'}"></dd>
                        </dl>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-3">
            <a href="/registered" class="btn btn-secondary">Back to User List</a>
        </div>
    </div>
</div>
<div th:replace="fragments::javascript"/>
</body>
</html>
